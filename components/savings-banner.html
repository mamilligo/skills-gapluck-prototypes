<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GapLuck - SavingsBanner Component</title>
  <meta name="description" content="Isolated view of the SavingsBanner component.">
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/reset.css">
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/utilities.css">
  <link rel="stylesheet" href="../styles/components/savings-banner.css">
  <style>
    .ag-back-link {
      display: block;
      margin-bottom: var(--space-4);
    }
  </style>
</head>
<body>
  <div class="ag-container ag-p-6">
    <a href="../index.html" class="ag-back-link">← Back to Hub</a>
    
    <div class="ag-savings-banner">
      <img class="ag-savings-banner__flag" src="../assets/flags/ae.svg" alt="UAE flag">
      <div class="ag-savings-banner__content">
        <div class="ag-savings-banner__label">Cheapest worldwide</div>
        <h3 class="ag-savings-banner__title">
          UAE · Save <span class="ag-savings-banner__amount">₺18,400 (24%)</span> vs Turkey
          <span class="ag-savings-banner__approximate">[approximate]</span>
        </h3>
      </div>
      <button class="ag-savings-banner__btn">
        View deal
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </div>
  </div>
</body>
</html>
